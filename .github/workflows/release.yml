name: Build and Release

on:
    push:
        tags:
            - "v*"
# action-gh-release needs contents: write 
permissions:
    contents: write

jobs:
    test:
        runs-on: macos-14 # Apple Silicon runner

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run bun test
              run: bun test

    build-macos-arm64:
        needs: test
        runs-on: macos-14 # Apple Silicon runner

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Determine build environment
              id: build-env
              run: |
                  if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
                    echo "env=canary" >> $GITHUB_OUTPUT
                  else
                    echo "env=stable" >> $GITHUB_OUTPUT
                  fi

            - name: Build app
              env:
                  ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  if [ "${{ steps.build-env.outputs.env }}" = "canary" ]; then
                    bun run build:canary
                  else
                    bun run build:stable
                  fi

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: artifacts/*
                  draft: false
                  prerelease: ${{ steps.build-env.outputs.env == 'canary' }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
