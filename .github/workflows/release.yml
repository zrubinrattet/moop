name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for example: v0.0.1)'
        required: true
      prerelease:
        description: 'Mark as prerelease'
        type: boolean
        default: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
          - os: macos-15-intel
            label: macos-x64
          - os: windows-2025
            label: windows-x64
          - os: ubuntu-24.04
            label: linux-x64

    env:
      # Optional: if configured, Electrobun can use these for macOS signing/notarization.
      ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
      ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
      ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
      ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
      ELECTROBUN_APPLEAPIKEY: ${{ secrets.ELECTROBUN_APPLEAPIKEY }}
      ELECTROBUN_APPLEAPIISSUER: ${{ secrets.ELECTROBUN_APPLEAPIISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            cmake \
            pkg-config

      - name: Install Apple signing certificate
        if: runner.os == 'macOS' && secrets.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          security delete-keychain build.keychain || true
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          rm certificate.p12

      - name: Write App Store Connect API key
        if: runner.os == 'macOS' && secrets.ELECTROBUN_APPLEAPIKEY_P8 != ''
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.ELECTROBUN_APPLEAPIKEY }}.p8"
          printf '%s' '${{ secrets.ELECTROBUN_APPLEAPIKEY_P8 }}' > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "ELECTROBUN_APPLEAPIKEYPATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build stable artifacts
        run: bun run build:stable

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.label }}
          path: artifacts/**
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**
          prerelease: ${{ github.event.inputs.prerelease || contains(github.ref_name, '-beta') || contains(github.event.inputs.tag, '-beta') }}
          generate_release_notes: true
