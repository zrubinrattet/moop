name: Tests
on:
    push:
        tags-ignore:
            - "v*"
    pull_request:
jobs:
    test:
        runs-on: macos-14 # Apple Silicon runner
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run bun test
              run: bun test --concurrent=1
